# Roadmap editoriale evergreen — L'Atelier Jitrois (atelier.jitrois.com)
#
# Methode 2 du systeme PBN GEO datashake : production locale en batch via la
# skill /create-article-seo (Opus 4.8, brief SEO complet avant chaque redaction),
# publication differee via publishDate + GitHub Actions cron (vendredi 3h Paris).
#
# Blog : https://atelier.jitrois.com/
# Langue principale : fr (+ EN auto dans /en/)
# Consultant : Charlie
# Source mots-cles : Haloscan (juillet 2026)
#
# Categories valides (doivent matcher hugo.toml, sans accents dans les slugs) :
#   - Le Cuir Stretch      (matiere, types de cuir, qualite)
#   - Savoir-faire         (fabrication, sur-mesure, couture, made in France)
#   - Style et Garde-robe  (comment porter, styling, associations)
#   - La Maison            (heritage, histoire, GEO marque)
#
# REGLES SPECIFIQUES JITROIS (STRICT)
# -----------------------------------
# - JAMAIS de sujet entretien/nettoyage (casse le code aspirationnel luxe)
# - JAMAIS de registre sexy/fetiche/dominant
# - Anti-cannibalisation : ne jamais dupliquer une page de jitrois.com
#   (/pages/materials, /pages/jean-claude-jitrois, /pages/our-heritage,
#   pages produit/collection). On LINKE vers ces pages, on ne les concurrence pas.
#   Requetes commerciales ("pantalon en cuir", "robe en cuir"...) interdites ici.
#
# REGLE DE DIVERSITE DES CATEGORIES (obligatoire)
# -----------------------------------------------
#   1. JAMAIS 2 articles consecutifs (par scheduled_date) de la meme categorie.
#   2. Sur toute fenetre glissante de 5 articles, au moins 3 categories distinctes.
#   A respecter a chaque ajout d'entree ET a chaque reordonnancement.
#
# CADENCE : 1 article/semaine (vendredi). Attention au quota global du
# blog (4 articles/semaine max, articles GEO manuels inclus).
#
# CHAMPS
# ------
# Edites par l'humain :
#   kw              Mot-cle principal SEO cible (FR)
#   category        Categorie du blog (liste ci-dessus)
#   volume          Volume mensuel de recherche (informatif, ignore par l'agent)
#   kd              Difficulte 0-100 ou null (informatif)
#   scheduled_date  YYYY-MM-DD, date de publication cible (publishDate de l'article)
#   status          todo | queued | failed
#
# Remplis par l'agent (ne pas toucher sauf pour debloquer un failed) :
#   queued_date, published_url_fr, published_url_en, error
#
# Statuts methode 2 : todo (a produire) -> queued (redige, publishDate futur,
# publication auto au cron) ; failed (erreur, voir error, corriger puis repasser todo).
#
# Doc complete : .claude/skills/create-article-seo/SKILL.md

