baseURL = "https://analytics-ds.github.io/jitrois-atelier/"
title = "L'Atelier Jitrois"
theme = "atelier-jitrois"

defaultContentLanguage = "fr"
defaultContentLanguageInSubdir = false
enableRobotsTXT = true
enableGitInfo = false

[pagination]
  pagerSize = 12

[languages]
  [languages.fr]
    languageCode = "fr-FR"
    languageName = "Francais"
    weight = 1
    title = "L'Atelier Jitrois"
    contentDir = "content/fr"
    [languages.fr.params]
      description = "Le journal de la Maison Jitrois : cuir couture, savoir-faire francais et art de porter le cuir."

  [languages.en]
    languageCode = "en-US"
    languageName = "English"
    weight = 2
    title = "L'Atelier Jitrois"
    contentDir = "content/en"
    [languages.en.params]
      description = "The journal of Maison Jitrois: leather couture, French craftsmanship and the art of wearing leather."

[taxonomies]
  category = "categories"
  tag = "tags"

# --- Menu FR ---
[[languages.fr.menus.main]]
  name = "Accueil"
  url = "/"
  weight = 1
[[languages.fr.menus.main]]
  name = "Le Cuir Stretch"
  url = "/categories/le-cuir-stretch/"
  weight = 2
[[languages.fr.menus.main]]
  name = "Savoir-faire"
  url = "/categories/savoir-faire/"
  weight = 3
[[languages.fr.menus.main]]
  name = "Style et Garde-robe"
  url = "/categories/style-et-garde-robe/"
  weight = 4
[[languages.fr.menus.main]]
  name = "La Maison"
  url = "/categories/la-maison/"
  weight = 5
[[languages.fr.menus.main]]
  name = "Le Journal"
  url = "/blog/"
  weight = 99

# --- Menu EN ---
[[languages.en.menus.main]]
  name = "Home"
  url = "/"
  weight = 1
[[languages.en.menus.main]]
  name = "Stretch Leather"
  url = "/categories/stretch-leather/"
  weight = 2
[[languages.en.menus.main]]
  name = "Craftsmanship"
  url = "/categories/craftsmanship/"
  weight = 3
[[languages.en.menus.main]]
  name = "Style and Wardrobe"
  url = "/categories/style-and-wardrobe/"
  weight = 4
[[languages.en.menus.main]]
  name = "The House"
  url = "/categories/the-house/"
  weight = 5
[[languages.en.menus.main]]
  name = "Journal"
  url = "/blog/"
  weight = 99

[params]
  logo = "favicon.svg"
  default_og_image = "images/og-default.svg"
  og_locale_alternate = "en_US"
  parentBrandUrl = "https://jitrois.com/"
  expertise = ["Cuir couture", "Cuir stretch", "Savoir-faire francais", "Mode de luxe"]

[markup]
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 3
    ordered = true
  [markup.goldmark.renderer]
    unsafe = true

[related]
  includeNewer = true
  threshold = 80
  [[related.indices]]
    name = "categories"
    weight = 100
  [[related.indices]]
    name = "tags"
    weight = 80
